name: Build and Push Web Container
run-name: ${{ gitea.actor }} is Building and Pushing Web Container 🚀
on:
  push:
    branches:
      - main
      - 'releases/**'

jobs:
  build-and-push-web:
    runs-on: ubuntu-latest
    container: catthehacker/ubuntu:act-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Login to Docker Hub (or other registry)
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}  # Add your Docker Hub username as a secret
          password: ${{ secrets.DOCKER_PASSWORD }}  # Add your Docker Hub password or access token as a secret
          registry: 192.168.2.143:3000


      - name: Build Docker image
        run: |
          docker build -t 192.168.2.143:3000/gereon/nivona-web:latest .
        working-directory: CoffeeWeb/  # Adjust the path to the directory containing your Dockerfile

      - name: Push Docker image
        run: |
          docker push 192.168.2.143:3000/gereon/nivona-web:latest