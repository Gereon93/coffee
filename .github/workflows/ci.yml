name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  test:
    name: Build & Test (.NET 10)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Coffee.sln

      - name: Build
        run: dotnet build Coffee.sln --no-restore -c Release

      - name: Test
        run: dotnet test CoffeeTest/CoffeeTest.csproj --no-build -c Release --verbosity normal
