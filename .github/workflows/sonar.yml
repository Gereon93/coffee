name: sonar

on:
  push:
    branches: [main]

concurrency:
  group: sonar-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonar-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      SONAR_ENABLED: ${{ secrets.SONAR_HOST_URL != '' && secrets.SONAR_TOKEN != '' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        if: env.SONAR_ENABLED == 'true'
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        if: env.SONAR_ENABLED == 'true'
        with:
          dotnet-version: '10.0.x'
      - name: SonarQube-Analyse (No-Op ohne Sonar-Secrets)
        if: env.SONAR_ENABLED == 'true'
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet tool install --global dotnet-sonarscanner
          dotnet sonarscanner begin /k:"coffee" /d:sonar.host.url="$SONAR_HOST_URL" /d:sonar.token="$SONAR_TOKEN"
          dotnet build Coffee.sln
          dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"
