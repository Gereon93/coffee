image: 192.168.2.143:3033/dotnet-9-special:latest

stages:
  - build
  - test
  - sonarqube-check
  - sonarqube-vulnerability-report

variables:
  coffee_solution: "Coffee.sln"
  test_project: "CoffeeTest/CoffeeTest.csproj"

cache:
  key: nuget
  paths:
    - ~/.nuget/packages/
  policy: pull-push

before_script:
  - 'dotnet restore $coffee_solution'

build:
  stage: build
  script:
    - 'dotnet build $coffee_solution'
  allow_failure: false
  only:
    - merge_requests
    - master
    - main
    - dev

test:
  stage: test
  script:
    - 'dotnet test $test_project'
  allow_failure: true
  only:
    - merge_requests
    - master
    - main
    - dev

sonarqube-check:
  stage: sonarqube-check
  image: 192.168.2.143:3033/dotnet-9-special:latest
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script:
    - "dotnet tool install --global dotnet-sonarscanner"
    - "export PATH=\"$PATH:$HOME/.dotnet/tools\""
    - "dotnet sonarscanner begin /k:\"gereon_coffee_ba5c47bb-a0a1-4e5a-b9d6-2187da863b11\" /d:sonar.token=\"$SONAR_TOKEN\" /d:\"sonar.host.url=$SONAR_HOST_URL\" "
    - "dotnet build"
    - "dotnet sonarscanner end /d:sonar.token=\"$SONAR_TOKEN\""
  allow_failure: true
  only:
    - merge_requests
    - master
    - main
    - dev

sonarqube-vulnerability-report:
  stage: sonarqube-vulnerability-report
  script:
    - 'curl -u "${SONAR_TOKEN}:" "${SONAR_HOST_URL}/api/issues/gitlab_sast_export?projectKey=gereon_coffee_ba5c47bb-a0a1-4e5a-b9d6-2187da863b11&branch=${CI_COMMIT_BRANCH}&pullRequest=${CI_MERGE_REQUEST_IID}" -o gl-sast-sonar-report.json'
  allow_failure: true
  only:
    - merge_requests
    - master
    - main
    - dev
  artifacts:
    expire_in: 1 day
    reports:
      sast: gl-sast-sonar-report.json
  dependencies:
    - sonarqube-check
